<script>
    // Navigation Logic
    function toggleMobileMenu() {
        document.getElementById('navLinks').classList.toggle('active');
    }

    function showPage(pId) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
        document.getElementById('navLinks').classList.remove('active');
        window.scrollTo(0, 0);

        if (pId === 'sportswear') {
            renderSportswearGallery();
            sportswearShow(0);
            resetSportswearTimer();
        }
    }

    // =========================
    // HOME SLIDER AUTO CHANGE
    // =========================
    let sIdx = 0;
    const slides = document.querySelectorAll('.slider-container .slide');

    function changeHomeSlide() {
        slides[sIdx].classList.remove('active');
        sIdx = (sIdx + 1) % slides.length;
        slides[sIdx].classList.add('active');
    }

    setInterval(changeHomeSlide, 3000);

    // =========================
    // PRODUCT VIEWER
    // =========================
    let pIdx = 0;
    const pSlides = document.querySelectorAll('.prod-slide');

    function prodMove(dir) {
        pSlides[pIdx].classList.remove('active');

        pIdx = (pIdx + dir + pSlides.length) % pSlides.length;

        pSlides[pIdx].classList.add('active');

        resetZoom();
    }

    setInterval(() => {
        prodMove(1);
    }, 3000);

    // =========================
    // IMAGE ZOOM
    // =========================
    function zoom(e) {
        const viewer = document.getElementById('viewer');
        const lens = document.getElementById('lens');

        const activeImg = document.querySelector('.prod-slide.active');

        if (!activeImg) return;

        const rect = viewer.getBoundingClientRect();

        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const percentX = (x / rect.width) * 100;
        const percentY = (y / rect.height) * 100;

        lens.style.display = 'block';
        lens.style.backgroundImage = `url(${activeImg.src})`;
        lens.style.backgroundSize = '200%';
        lens.style.backgroundPosition = `${percentX}% ${percentY}%`;
    }

    function resetZoom() {
        const lens = document.getElementById('lens');

        if (lens) {
            lens.style.display = 'none';
        }
    }

    // =========================
    // CHATBOT
    // =========================
    function toggleChat() {
        const chat = document.getElementById('chatbot');

        chat.style.display =
            chat.style.display === 'flex'
                ? 'none'
                : 'flex';
    }

    function sendChat() {
        const input = document.getElementById('chat-in');
        const logs = document.getElementById('chat-logs');

        const msg = input.value.trim();

        if (!msg) return;

        logs.innerHTML += `
            <div style="background:white; padding:10px; border-radius:10px; margin-bottom:10px; font-size:13px; text-align:right;">
                ${msg}
            </div>
        `;

        setTimeout(() => {
            logs.innerHTML += `
                <div style="background:#dadde2; padding:10px; border-radius:10px; margin-bottom:10px; font-size:13px;">
                    Thank you for contacting TraditionX Industry. Please WhatsApp us for complete pricing and production details.
                </div>
            `;

            logs.scrollTop = logs.scrollHeight;
        }, 600);

        input.value = '';

        logs.scrollTop = logs.scrollHeight;
    }

    // =========================
    // SPORTSWEAR GALLERY
    // =========================

    // FILES:
    // a2 (1).jpeg  TO  a2 (44).jpeg

    const sportswearImages = Array.from(
        { length: 44 },
        (_, i) => `a2 (${i + 1}).jpeg`
    );

    let swIdx = 0;
    let swTimer = null;

    function renderSportswearGallery() {
        const viewer = document.getElementById('sportswearViewer');
        const thumbs = document.getElementById('sportswearThumbs');

        if (!viewer || !thumbs) return;

        // REMOVE OLD IMAGES
        viewer.querySelectorAll('.sportswear-slide').forEach(el => el.remove());

        thumbs.innerHTML = '';

        // ADD NEW IMAGES
        sportswearImages.forEach((src, index) => {

            // MAIN IMAGE
            const img = document.createElement('img');

            img.src = src;
            img.alt = `Sportswear ${index + 1}`;

            img.className =
                'sportswear-slide' +
                (index === 0 ? ' active' : '');

            viewer.insertBefore(
                img,
                viewer.querySelector('.next-arrow')
            );

            // THUMBNAIL
            const thumb = document.createElement('img');

            thumb.src = src;
            thumb.alt = `Thumb ${index + 1}`;

            thumb.className =
                'sportswear-thumb' +
                (index === 0 ? ' active' : '');

            thumb.onclick = () => {
                sportswearShow(index);
                resetSportswearTimer();
            };

            thumbs.appendChild(thumb);
        });
    }

    function sportswearShow(index) {

        const slides =
            document.querySelectorAll('#sportswearViewer .sportswear-slide');

        const thumbs =
            document.querySelectorAll('.sportswear-thumb');

        if (!slides.length) return;

        slides[swIdx].classList.remove('active');
        thumbs[swIdx].classList.remove('active');

        swIdx =
            (index + slides.length) %
            slides.length;

        slides[swIdx].classList.add('active');
        thumbs[swIdx].classList.add('active');
    }

    // WORKING ARROWS
    function sportswearMove(dir) {
        sportswearShow(swIdx + dir);
        resetSportswearTimer();
    }

    // AUTO CHANGE EVERY 3 SEC
    function resetSportswearTimer() {

        if (swTimer) {
            clearInterval(swTimer);
        }

        swTimer = setInterval(() => {
            sportswearMove(1);
        }, 3000);
    }

    // INITIAL LOAD
    renderSportswearGallery();
    resetSportswearTimer();
</script>
