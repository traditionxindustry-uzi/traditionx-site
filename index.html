<script>
    // Navigation Logic
    function toggleMobileMenu() { document.getElementById('navLinks').classList.toggle('active'); }
    function showPage(pId) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
        document.getElementById('navLinks').classList.remove('active');
        window.scrollTo(0,0);
        if (pId === 'sportswear') { renderSportswearGallery(); sportswearShow(0); resetSportswearTimer(); }
    }

    // Main Slider
    let sIdx = 0;
    const slides = document.querySelectorAll('.slider-container .slide');
    setInterval(() => {
        slides[sIdx].classList.remove('active');
        sIdx = (sIdx + 1) % slides.length;
        slides[sIdx].classList.add('active');
    }, 3000);

    // Product Viewer Logic
    let pIdx = 0;
    const pSlides = document.querySelectorAll('.prod-slide');
    function prodMove(dir) {
        pSlides[pIdx].classList.remove('active');
        pIdx = (pIdx + dir + pSlides.length) % pSlides.length;
        pSlides[pIdx].classList.add('active');
        resetZoom();
    }
    setInterval(() => prodMove(1), 3000);

    function zoom(e) {
        const v = document.getElementById('viewer');
        const l = document.getElementById('lens');
    }
    function resetZoom() {
    }
    function toggleChat() {
        const chat = document.getElementById('chatbot');
        chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
    }
    function sendChat() {
    }

    // Sportswear Gallery Logic
    const sportswearImages = [
        "SW1.jpeg",
        "SW2.jpeg",
        "SW3.jpeg",
        "SW4.jpeg",
        "SW5.jpeg",
        "SW6.jpeg",
        "SW7.jpeg",
        "SW8.jpeg",
        "SW9.jpeg",
        "SW10.jpeg",
        "SW11.jpeg",
        "SW12.jpeg",
        "SW13.jpeg",
        "SW14.jpeg",
        "SW15.jpeg",
        "SW16.jpeg",
        "SW17.jpeg",
        "SW18.jpeg",
        "SW19.jpeg",
        "SW20.jpeg",
        "SW21.jpeg",
        "SW22.jpeg",
        "SW23.jpeg"
    ];

    let swIdx = 0;
    let swTimer = null;

    function renderSportswearGallery() {
        const viewer = document.getElementById('sportswearViewer');
        const thumbs = document.getElementById('sportswearThumbs');
        if (!viewer || !thumbs) return;

        const existingMain = viewer.querySelectorAll('.sportswear-slide');
        existingMain.forEach(el => el.remove());
        thumbs.innerHTML = '';

        sportswearImages.forEach((src, index) => {
            const img = document.createElement('img');
            img.src = src;
            img.alt = `Sportswear ${index + 1}`;
            img.className = 'sportswear-slide' + (index === 0 ? ' active' : '');
            viewer.insertBefore(img, viewer.firstChild);

            const thumb = document.createElement('img');
            thumb.src = src;
            thumb.alt = `Thumb ${index + 1}`;
            thumb.className = 'sportswear-thumb' + (index === 0 ? ' active' : '');
            thumb.onclick = () => sportswearShow(index);
            thumbs.appendChild(thumb);
        });
    }

    function sportswearShow(index) {
        const slides = document.querySelectorAll('#sportswearViewer .sportswear-slide');
        const thumbs = document.querySelectorAll('.sportswear-thumb');
        if (!slides.length) return;
        slides[swIdx].classList.remove('active');
        thumbs[swIdx].classList.remove('active');
        swIdx = (index + slides.length) % slides.length;
        slides[swIdx].classList.add('active');
        thumbs[swIdx].classList.add('active');
    }

    function sportswearMove(dir) {
        sportswearShow(swIdx + dir);
        resetSportswearTimer();
    }

    function resetSportswearTimer() {
        if (swTimer) clearInterval(swTimer);
        swTimer = setInterval(() => sportswearMove(1), 3000);
    }

    renderSportswearGallery();
    resetSportswearTimer();
</script>
